query ListVariableProductsWithVariationSkus($first: Int = 50) {
  products(where: { type: VARIABLE, visibility: VISIBLE }, first: $first) {
    nodes {
      id
      databaseId
      name
      slug
      ... on VariableProduct {
        sku
        partNumber
        price
        shortDescription
        image {
          sourceUrl
          altText
        }
        productCategories {
          nodes {
            name
            slug
            parent {
              node {
                id
                name
                slug
              }
            }
          }
        }
        variations(first: 100) {
          nodes {
            sku
          }
        }
      }
    }
  }
}

