query SearchProducts($search: String!, $first: Int = 20) {
  products(where: { search: $search, visibility: VISIBLE }, first: $first) {
    nodes {
      id
      databaseId
      name
      slug
      ... on SimpleProduct {
        sku
        partNumber
        price
        shortDescription
        image {
          sourceUrl
          altText
        }
        productCategories {
          nodes {
            name
            slug
            parent {
              node {
                id
                name
                slug
              }
            }
          }
        }
      }
      ... on VariableProduct {
        sku
        partNumber
        price
        shortDescription
        image {
          sourceUrl
          altText
        }
        productCategories {
          nodes {
            name
            slug
            parent {
              node {
                id
                name
                slug
              }
            }
          }
        }
        variations(first: 100) {
          nodes {
            sku
          }
        }
      }
    }
  }
}

