name: CI

on:
  push:
    branches: [ main, '**' ]
  pull_request:
    branches: [ main ]

jobs:
  web-ci:
    name: "Web: sanity, test, build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: "CI: check production envs (main only)"
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          NEXT_PUBLIC_WORDPRESS_GRAPHQL: ${{ secrets.NEXT_PUBLIC_WORDPRESS_GRAPHQL }}
          PREVIEW_SECRET: ${{ secrets.PREVIEW_SECRET }}
        run: node scripts/check_prod_envs.mjs

      - name: Run preview sanity
        run: node scripts/preview_sanity.mjs

      - name: Run unit tests
        run: pnpm test

      - name: Run Storybook accessibility tests
        run: pnpm run test:storybook:ci
        continue-on-error: true  # Non-blocking: Reports issues without failing CI

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm exec playwright test --project=chromium
        continue-on-error: true  # Non-blocking: Enterprise infrastructure in place, gradually improving
        env:
          CI: true

      - name: Upload E2E test results
        if: failure() || success()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: pnpm run build
