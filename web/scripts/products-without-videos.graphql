# Scan Products Without Videos - GraphQL Queries
# 
# Use these queries in GraphiQL: https://bapiheadlessstaging.kinsta.cloud/graphql
# 
# These queries will help identify which products are missing video content.

# ============================================================================
# Query 1: Get first 100 products with video data
# ============================================================================
query GetProductsWithVideos_Page1 {
  products(first: 100) {
    pageInfo {
      hasNextPage
      endCursor
      # If hasNextPage is true, copy endCursor value and use it in Query 2
    }
    nodes {
      id
      databaseId
      name
      slug
      productVideos {
        heading
        videos {
          url
          title
        }
      }
      ... on SimpleProduct {
        sku
      }
      ... on VariableProduct {
        sku
      }
    }
  }
}

# ============================================================================
# Query 2: Get next page of products (if hasNextPage was true)
# ============================================================================
# Replace "YOUR_CURSOR_HERE" with the endCursor from previous query
query GetProductsWithVideos_Page2 {
  products(first: 100, after: "YOUR_CURSOR_HERE") {
    pageInfo {
      hasNextPage
      endCursor
    }
    nodes {
      id
      databaseId
      name
      slug
      productVideos {
        heading
        videos {
          url
          title
        }
      }
      ... on SimpleProduct {
        sku
      }
      ... on VariableProduct {
        sku
      }
    }
  }
}

# ============================================================================
# Query 3: Get ALL products in one query (⚠️ May timeout with 608 products)
# ============================================================================
# Only use this if you have high query limits configured
query GetAllProductsWithVideos {
  products(first: 1000) {
    nodes {
      id
      databaseId
      name
      slug
      productVideos {
        heading
        videos {
          url
          title
        }
      }
      ... on SimpleProduct {
        sku
      }
      ... on VariableProduct {
        sku
      }
    }
  }
}

# ============================================================================
# How to Identify Products Without Videos
# ============================================================================
# 
# After running the query, inspect the results:
# 
# Products WITHOUT videos will have:
# 1. "productVideos": null
# 2. "productVideos": []
# 3. "productVideos": [{ "heading": "...", "videos": [] }]
# 
# Products WITH videos will have:
# "productVideos": [
#   {
#     "heading": "Installation",
#     "videos": [
#       {
#         "url": "https://youtube.com/...",
#         "title": "Product Demo"
#       }
#     ]
#   }
# ]
# 
